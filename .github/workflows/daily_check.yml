name: Daily Streak Check

on:
  schedule:
    # Run every day at 22:00 UTC — reminds you if today's log is missing
    - cron: "0 22 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-daily-log:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check today's log exists
        id: check_log
        run: |
          TODAY=$(date +%Y-%m-%d)
          YEAR=$(date +%Y)
          MONTH=$(date +%m)
          LOG_FILE="logs/${YEAR}/${MONTH}/${TODAY}.md"

          if [ -f "$LOG_FILE" ]; then
            echo "log_exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Today's log exists: $LOG_FILE"
          else
            echo "log_exists=false" >> "$GITHUB_OUTPUT"
            echo "❌ Today's log is missing: $LOG_FILE"
          fi

      - name: Open reminder issue if log is missing
        if: steps.check_log.outputs.log_exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `📝 Daily Log Reminder — ${today}`;

            // Check if issue already exists for today
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'daily-log-reminder',
            });

            const existingIssue = issues.find(i => i.title === title);
            if (existingIssue) {
              console.log(`Issue already exists: #${existingIssue.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: [
                `## 📝 Daily Log Reminder`,
                ``,
                `Today's log (\`logs/${today.slice(0,4)}/${today.slice(5,7)}/${today}.md\`) has not been created yet.`,
                ``,
                `### Quick Actions`,
                ``,
                `1. Create the log locally:`,
                `   \`\`\`bash`,
                `   python cli.py new`,
                `   \`\`\``,
                ``,
                `2. Fill in your notes and commit.`,
                ``,
                `3. Close this issue once done.`,
                ``,
                `---`,
                `*🤖 Auto-generated by GitHub Streak AI*`,
              ].join('\n'),
              labels: ['daily-log-reminder'],
            });

            console.log('📝 Reminder issue created.');

  validate-markdown:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate markdown files
        run: |
          echo "🔍 Checking markdown files..."
          errors=0

          for file in $(find logs reports -name "*.md" 2>/dev/null); do
            # Check for empty files
            if [ ! -s "$file" ]; then
              echo "⚠️ Empty file: $file"
              errors=$((errors + 1))
            fi

            # Check for valid UTF-8
            if ! iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1; then
              echo "❌ Invalid encoding: $file"
              errors=$((errors + 1))
            fi
          done

          if [ $errors -gt 0 ]; then
            echo "❌ Found $errors issue(s)"
            exit 1
          else
            echo "✅ All markdown files are valid"
          fi

  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock

      - name: Run tests
        run: pytest tests/ -v --tb=short
